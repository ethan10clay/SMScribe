name: Deploy Lambda Functions

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    name: Build and deploy changed Lambda functions
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need previous commit to diff against

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Detect which parts of the backend changed
      - name: Detect changes
        id: changes
        run: |
          # shared layer needs rebuilding if shared/ or requirements changed
          if git diff --name-only HEAD~1 HEAD | grep -qE '^backend/(shared/|requirements)'; then
            echo "shared=true" >> $GITHUB_OUTPUT
          else
            echo "shared=false" >> $GITHUB_OUTPUT
          fi

          # individual functions
          for fn in auth/verify_start auth/verify_check user/me user/delete stripe/checkout stripe/webhook stripe/portal telegram/webhook; do
            key=$(echo $fn | tr '/' '_')
            if git diff --name-only HEAD~1 HEAD | grep -qE "^backend/functions/${fn}/|^backend/(shared/|requirements)"; then
              echo "${key}=true" >> $GITHUB_OUTPUT
            else
              echo "${key}=false" >> $GITHUB_OUTPUT
            fi
          done

          echo "--- Changed files ---"
          git diff --name-only HEAD~1 HEAD

      # ── Build shared Lambda layer (only if shared/ or requirements changed) ───────────────────────────
      - name: Build shared layer
        if: steps.changes.outputs.shared == 'true' || steps.changes.outputs.auth_verify_start == 'true' || steps.changes.outputs.auth_verify_check == 'true' || steps.changes.outputs.user_me == 'true' || steps.changes.outputs.stripe_checkout == 'true' || steps.changes.outputs.stripe_webhook == 'true'
        run: |
          mkdir -p /tmp/layer/python/lib/python3.11/site-packages
          cp backend/shared/db.py       /tmp/layer/python/
          cp backend/shared/security.py /tmp/layer/python/
          pip install -r backend/requirements.txt \
            --target /tmp/layer/python/lib/python3.11/site-packages \
            --quiet
          cd /tmp/layer
          zip -r /tmp/shared-layer.zip python/ -q
          echo "Shared layer built"

      - name: Publish shared layer
        id: publish_layer
        if: steps.changes.outputs.shared == 'true' || steps.changes.outputs.auth_verify_start == 'true' || steps.changes.outputs.auth_verify_check == 'true' || steps.changes.outputs.user_me == 'true' || steps.changes.outputs.stripe_checkout == 'true' || steps.changes.outputs.stripe_webhook == 'true'
        run: |
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name smscribe-shared \
            --description "SMScribe shared db + security + dependencies" \
            --zip-file fileb:///tmp/shared-layer.zip \
            --compatible-runtimes python3.11 \
            --query LayerVersionArn \
            --output text)
          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT
          echo "Published layer: $LAYER_ARN"

      # ── Deploy each function only if it changed ───────────────────────────
      - name: Deploy smscribe-auth-verify-start
        if: steps.changes.outputs.auth_verify_start == 'true'
        run: |
          cd backend/functions/auth/verify_start
          zip -r /tmp/fn.zip handler.py -q
          aws lambda update-function-code \
            --function-name smscribe-auth-verify-start \
            --zip-file fileb:///tmp/fn.zip \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-auth-verify-start
          aws lambda update-function-configuration \
            --function-name smscribe-auth-verify-start \
            --layers ${{ steps.publish_layer.outputs.layer_arn }} \
            --environment "Variables={
              DYNAMODB_TABLE_PREFIX=smscribe-,
              FRONTEND_URL=https://smscribe.com,
              JWT_SECRET=${{ secrets.JWT_SECRET }},
              TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }},
              TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }},
              TWILIO_VERIFY_SERVICE_SID=${{ secrets.TWILIO_VERIFY_SERVICE_SID }}
            }" \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-auth-verify-start
          echo "smscribe-auth-verify-start deployed"

      - name: Deploy smscribe-auth-verify-check
        if: steps.changes.outputs.auth_verify_check == 'true'
        run: |
          cd backend/functions/auth/verify_check
          zip -r /tmp/fn.zip handler.py -q
          aws lambda update-function-code \
            --function-name smscribe-auth-verify-check \
            --zip-file fileb:///tmp/fn.zip \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-auth-verify-check
          aws lambda update-function-configuration \
            --function-name smscribe-auth-verify-check \
            --layers ${{ steps.publish_layer.outputs.layer_arn }} \
            --environment "Variables={
              DYNAMODB_TABLE_PREFIX=smscribe-,
              FRONTEND_URL=https://smscribe.com,
              JWT_SECRET=${{ secrets.JWT_SECRET }},
              TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }},
              TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }},
              TWILIO_VERIFY_SERVICE_SID=${{ secrets.TWILIO_VERIFY_SERVICE_SID }}
            }" \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-auth-verify-check
          echo "smscribe-auth-verify-check deployed"

      - name: Deploy smscribe-user-me
        if: steps.changes.outputs.user_me == 'true'
        run: |
          cd backend/functions/user/me
          zip -r /tmp/fn.zip handler.py -q
          aws lambda update-function-code \
            --function-name smscribe-user-me \
            --zip-file fileb:///tmp/fn.zip \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-user-me
          aws lambda update-function-configuration \
            --function-name smscribe-user-me \
            --layers ${{ steps.publish_layer.outputs.layer_arn }} \
            --environment "Variables={
              DYNAMODB_TABLE_PREFIX=smscribe-,
              FRONTEND_URL=https://smscribe.com,
              JWT_SECRET=${{ secrets.JWT_SECRET }}
            }" \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-user-me
          echo "smscribe-user-me deployed"

      - name: Deploy smscribe-user-delete
        if: steps.changes.outputs.user_delete == 'true'
        run: |
          cd backend/functions/user/delete
          zip -r /tmp/fn.zip handler.py -q
          aws lambda update-function-code \
            --function-name smscribe-user-delete \
            --zip-file fileb:///tmp/fn.zip \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-user-delete
          aws lambda update-function-configuration \
            --function-name smscribe-user-delete \
            --layers ${{ steps.publish_layer.outputs.layer_arn }} \
            --environment "Variables={
              DYNAMODB_TABLE_PREFIX=smscribe-,
              FRONTEND_URL=https://smscribe.com,
              JWT_SECRET=${{ secrets.JWT_SECRET }},
              STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }},
              S3_BUCKET=smscribe.com
            }" \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-user-delete
          echo "smscribe-user-delete deployed"

      - name: Deploy smscribe-stripe-checkout
        if: steps.changes.outputs.stripe_checkout == 'true'
        run: |
          cd backend/functions/stripe/checkout
          zip -r /tmp/fn.zip handler.py -q
          aws lambda update-function-code \
            --function-name smscribe-stripe-checkout \
            --zip-file fileb:///tmp/fn.zip \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-stripe-checkout
          aws lambda update-function-configuration \
            --function-name smscribe-stripe-checkout \
            --layers ${{ steps.publish_layer.outputs.layer_arn }} \
            --environment "Variables={
              DYNAMODB_TABLE_PREFIX=smscribe-,
              FRONTEND_URL=https://smscribe.com,
              JWT_SECRET=${{ secrets.JWT_SECRET }},
              STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }},
              STRIPE_STUDENT_MONTHLY_PRICE_ID=${{ secrets.STRIPE_STUDENT_MONTHLY_PRICE_ID }},
              STRIPE_STUDENT_ANNUAL_PRICE_ID=${{ secrets.STRIPE_STUDENT_ANNUAL_PRICE_ID }},
              STRIPE_PRO_MONTHLY_PRICE_ID=${{ secrets.STRIPE_PRO_MONTHLY_PRICE_ID }},
              STRIPE_PRO_ANNUAL_PRICE_ID=${{ secrets.STRIPE_PRO_ANNUAL_PRICE_ID }}
            }" \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-stripe-checkout
          echo "smscribe-stripe-checkout deployed"

      - name: Deploy smscribe-stripe-webhook
        if: steps.changes.outputs.stripe_webhook == 'true'
        run: |
          cd backend/functions/stripe/webhook
          zip -r /tmp/fn.zip handler.py -q
          aws lambda update-function-code \
            --function-name smscribe-stripe-webhook \
            --zip-file fileb:///tmp/fn.zip \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-stripe-webhook
          aws lambda update-function-configuration \
            --function-name smscribe-stripe-webhook \
            --layers ${{ steps.publish_layer.outputs.layer_arn }} \
            --environment "Variables={
              DYNAMODB_TABLE_PREFIX=smscribe-,
              STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }},
              STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            }" \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-stripe-webhook
          echo "smscribe-stripe-webhook deployed"

      - name: Deploy smscribe-stripe-portal
        if: steps.changes.outputs.stripe_portal == 'true'
        run: |
          cd backend/functions/stripe/portal
          zip -r /tmp/fn.zip handler.py -q
          aws lambda update-function-code \
            --function-name smscribe-stripe-portal \
            --zip-file fileb:///tmp/fn.zip \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-stripe-portal
          aws lambda update-function-configuration \
            --function-name smscribe-stripe-portal \
            --layers ${{ steps.publish_layer.outputs.layer_arn }} \
            --environment "Variables={
              DYNAMODB_TABLE_PREFIX=smscribe-,
              FRONTEND_URL=https://smscribe.com,
              JWT_SECRET=${{ secrets.JWT_SECRET }},
              STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            }" \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-stripe-portal
          echo "smscribe-stripe-portal deployed"

      - name: Deploy smscribe-telegram-webhook
        if: steps.changes.outputs.telegram_webhook == 'true'
        run: |
          cd backend/functions/telegram/webhook
          zip -r /tmp/fn.zip handler.py -q
          aws lambda update-function-code \
            --function-name smscribe-telegram-webhook \
            --zip-file fileb:///tmp/fn.zip \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-telegram-webhook
          aws lambda update-function-configuration \
            --function-name smscribe-telegram-webhook \
            --layers ${{ steps.publish_layer.outputs.layer_arn }} \
            --environment "Variables={
              DYNAMODB_TABLE_PREFIX=smscribe-,
              TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }},
              MODAL_TRANSCRIBE_URL=${{ secrets.MODAL_TRANSCRIBE_URL }}
            }" \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name smscribe-telegram-webhook
          echo "smscribe-telegram-webhook deployed"

      - name: Deployment summary
        run: |
          echo ""
          echo "Deploy complete."
