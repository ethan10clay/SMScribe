name: Deploy Modal Transcriber

on:
  push:
    branches: [main]
    paths:
      - "modal/**"
      - ".github/workflows/deploy-modal.yml"

jobs:
  deploy:
    name: Deploy transcriber to Modal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal
        run: pip install modal

      - name: Authenticate Modal
        run: modal token set --token-id ${{ secrets.MODAL_TOKEN_ID }} --token-secret ${{ secrets.MODAL_TOKEN_SECRET }}

      - name: Deploy transcriber
        run: modal deploy modal/transcriber.py

      - name: Print endpoint URL
        run: echo "Transcriber deployed. Update MODAL_TRANSCRIBE_URL secret if the URL changed."
